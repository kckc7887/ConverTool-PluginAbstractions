name: Publish NuGet package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: read
  packages: write

jobs:
  pack-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack ./PluginAbstractions.csproj -c Release -o ./nupkg /p:PackageVersion=${{ inputs.version }}

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "./nupkg/*.nupkg"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --skip-duplicate

