name: Publish NuGet package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: read

jobs:
  pack-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack ./PluginAbstractions.csproj -c Release -o ./nupkg /p:PackageVersion=${{ inputs.version }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "./nupkg/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate

